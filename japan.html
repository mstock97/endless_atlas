<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan | Horizon Trails</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Primary Palette */
            --forest: #1E4034;
            --canopy: #2D6A4F;
            --moss: #52B788;
            /* Neutrals */
            --ink: #0F0F0F;
            --paper: #F7F5F0;
            --white: #FFFFFF;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', sans-serif;
            background-color: var(--paper);
            color: var(--ink);
            overflow-x: hidden;
        }

        /* Navigation - The Anchor Style */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background-color: var(--forest);
            color: var(--paper);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Hero Section */
        .hero-container {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* Scrim for legibility */
        .hero-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 15, 0.3); /* Ink at 30% opacity */
            z-index: 0;
        }

        .hero-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(8rem, 20vw, 15rem);
            color: var(--white);
            margin: 0;
            z-index: 1;
            letter-spacing: 0.1em;
            transition: transform 0.1s ease-out;
            pointer-events: none;
        }

        /* Content spacing for scroll testing */
        .content-placeholder {
            height: 200vh;
            padding: 100px 10%;
            background-color: var(--paper);
        }

        .editorial-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.25rem;
            max-width: 800px;
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Horizon Trails</div>
        <div class="menu-trigger">EXPLORE</div>
    </nav>

    <section class="hero-container">
        <picture>
            <source media="(max-width: 768px)" srcset="https://storage.googleapis.com/blog_asset_storage_prod/Japan%20Assets/Japan_Fuji_Hero-mobile.JPG">
            <img src="https://storage.googleapis.com/blog_asset_storage_prod/Japan%20Assets/Japan_Fuji_Hero-hd.JPG" alt="Mount Fuji, Japan" class="hero-image">
        </picture>
        <h1 class="hero-title" id="heroText">JAPAN</h1>
    </section>

    <div class="content-placeholder">
        <p class="editorial-text">Go where the map ends. The trail doesn't care about your schedule.</p>
    </div>

    <script>
        window.addEventListener('scroll', function() {
            const scrollValue = window.scrollY;
            const heroText = document.getElementById('heroText');
            
            // Cool scroll effect: Text scales and fades as you move down
            const scale = 1 + (scrollValue / 1000);
            const opacity = 1 - (scrollValue / 600);
            
            if (opacity >= 0) {
                heroText.style.transform = `scale(${scale})`;
                heroText.style.opacity = opacity;
            }
        });
    </script>

</body>
</html>
