<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan | Horizon Trails</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Brand Palette */
            --forest: #1E4034;
            --paper: #F7F5F0;
            --ink: #0F0F0F;
            --white: #FFFFFF;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', sans-serif;
            background-color: var(--paper);
            color: var(--ink);
            overflow-x: hidden;
        }

        /* Hero Section - 75% height */
        .hero-container {
            position: relative;
            height: 75vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--ink);
        }

        picture, .hero-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .hero-image {
            object-fit: cover;
            /* Updated to center crop as requested */
            object-position: center center; 
            display: block;
            z-index: 0;
        }

        /* Scrim: 60% Ink per Guide */
        .hero-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 15, 0.6);
            z-index: 1;
        }

        .hero-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(5rem, 20vw, 15rem);
            color: var(--white);
            margin: 0;
            z-index: 2;
            letter-spacing: 0.05em;
            text-align: center;
            pointer-events: none;
            will-change: transform, opacity;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Main Content Area */
        main {
            min-height: 50vh;
            padding: 80px 10%;
            background-color: var(--paper);
            position: relative;
            z-index: 3;
        }

        .editorial-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 4vw, 2.25rem);
            max-width: 850px;
            line-height: 1.4;
            color: var(--forest);
            margin: 0;
        }

        @media (max-width: 768px) {
            .hero-container {
                height: 65vh;
            }
        }
    </style>
</head>
<body>

    <div id="site-header"></div>

    <section class="hero-container">
        <picture>
            <source media="(max-width: 768px)" srcset="https://storage.googleapis.com/blog_asset_storage_prod/Japan%20Assets/Japan_Fuji_Hero-mobile.JPG">
            <img 
                src="https://storage.googleapis.com/blog_asset_storage_prod/Japan%20Assets/Japan_Fuji_Hero-hd.JPG" 
                alt="Mount Fuji, Japan" 
                class="hero-image"
                referrerpolicy="no-referrer">
        </picture>
        <h1 class="hero-title" id="heroText">JAPAN</h1>
    </section>

    <main>
        <p class="editorial-text">
            Go where the map ends. The trail doesn't care about your schedule. 
            Experience the tension between the raw and the refined.
        </p>
    </main>

    <div id="site-footer"></div>

    <script src="components.js"></script>

    <script>
        // Scroll Interaction for the Title
        window.addEventListener('scroll', function() {
            const scrollValue = window.scrollY;
            const heroText = document.getElementById('heroText');
            
            const scale = 1 + (scrollValue / 600);
            const opacity = 1 - (scrollValue / 400);
            
            if (opacity >= 0) {
                heroText.style.transform = `scale(${scale})`;
                heroText.style.opacity = opacity;
            } else {
                heroText.style.opacity = 0;
            }
        });
    </script>

</body>
</html>
