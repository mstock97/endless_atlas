<script>
    function sendHeight() {
        // Target the main content wrapper directly to get the true height of the content
        const wrapper = document.getElementById('fx_jpy_usd');
        if (wrapper) {
            // offsetHeight gets the true element size. We add 32 to account for the body's 16px top and bottom padding.
            const trueHeight = wrapper.offsetHeight + 32;
            window.parent.postMessage({ height: trueHeight }, '*'); 
        }
    }

    // Observe the specific wrapper ID, which ignores the iframe window size and only looks at content
    const observer = new ResizeObserver(() => {
        sendHeight();
    });

    window.onload = () => {
        const wrapper = document.getElementById('fx_jpy_usd');
        if (wrapper) {
            observer.observe(wrapper);
        }
        // Send initial height after a brief moment to ensure fonts load
        setTimeout(sendHeight, 100);
    };

    // Failsafe: Ensure chart animations (which take ~300ms) trigger a final height update
    document.addEventListener('click', () => {
        setTimeout(sendHeight, 50);
        setTimeout(sendHeight, 350); 
    });
</script>

<script>
// ── CONFIGURE: change these two lines to set default currencies ──────────
var FX_FROM = "JPY";   // "From" currency code  e.g. "jpy"
var FX_TO   = "USD";     // "To"   currency code  e.g. "USD"
// ─────────────────────────────────────────────────────────────────────────
(function() {
var DEFAULT_FROM = FX_FROM;
var DEFAULT_TO   = FX_TO;
var CURRENCIES   = {"AED": "UAE Dirham", "AFN": "Afghan Afghani", "ALL": "Albanian Lek", "AMD": "Armenian Dram", "ANG": "Netherlands Antillean Guilder", "AOA": "Angolan Kwanza", "ARS": "Argentine Peso", "AUD": "Australian Dollar", "AWG": "Aruban Florin", "AZN": "Azerbaijani Manat", "BAM": "Bosnia-Herzegovina Mark", "BBD": "Barbadian Dollar", "BDT": "Bangladeshi Taka", "BGN": "Bulgarian Lev", "BHD": "Bahraini Dinar", "BIF": "Burundian Franc", "BMD": "Bermudian Dollar", "BND": "Brunei Dollar", "BOB": "Bolivian Boliviano", "BRL": "Brazilian Real", "BSD": "Bahamian Dollar", "BTN": "Bhutanese Ngultrum", "BWP": "Botswanan Pula", "BYN": "Belarusian Ruble", "BZD": "Belize Dollar", "CAD": "Canadian Dollar", "CDF": "Congolese Franc", "CHF": "Swiss Franc", "CLP": "Chilean Peso", "CNY": "Chinese Yuan", "COP": "Colombian Peso", "CRC": "Costa Rican Colon", "CUP": "Cuban Peso", "CVE": "Cape Verdean Escudo", "CZK": "Czech Koruna", "DJF": "Djiboutian Franc", "DKK": "Danish Krone", "DOP": "Dominican Peso", "DZD": "Algerian Dinar", "EGP": "Egyptian Pound", "ERN": "Eritrean Nakfa", "ETB": "Ethiopian Birr", "EUR": "Euro", "FJD": "Fijian Dollar", "FKP": "Falkland Islands Pound", "GBP": "British Pound", "GEL": "Georgian Lari", "GHS": "Ghanaian Cedi", "GIP": "Gibraltar Pound", "GMD": "Gambian Dalasi", "GNF": "Guinean Franc", "GTQ": "Guatemalan Quetzal", "GYD": "Guyanaese Dollar", "HKD": "Hong Kong Dollar", "HNL": "Honduran Lempira", "HTG": "Haitian Gourde", "HUF": "Hungarian Forint", "IDR": "Indonesian Rupiah", "ILS": "Israeli Shekel", "INR": "Indian Rupee", "IQD": "Iraqi Dinar", "IRR": "Iranian Rial", "ISK": "Icelandic Krona", "JMD": "Jamaican Dollar", "JOD": "Jordanian Dinar", "JPY": "Japanese Yen", "KES": "Kenyan Shilling", "KGS": "Kyrgystani Som", "KHR": "Cambodian Riel", "KMF": "Comorian Franc", "KPW": "North Korean Won", "KRW": "South Korean Won", "KWD": "Kuwaiti Dinar", "KYD": "Cayman Islands Dollar", "KZT": "Kazakhstani Tenge", "LAK": "Laotian Kip", "LBP": "Lebanese Pound", "LKR": "Sri Lankan Rupee", "LRD": "Liberian Dollar", "LSL": "Lesotho Loti", "LYD": "Libyan Dinar", "MAD": "Moroccan Dirham", "MDL": "Moldovan Leu", "MGA": "Malagasy Ariary", "MKD": "Macedonian Denar", "MMK": "Myanma Kyat", "MNT": "Mongolian Tugrik", "MOP": "Macanese Pataca", "MRU": "Mauritanian Ouguiya", "MUR": "Mauritian Rupee", "MVR": "Maldivian Rufiyaa", "MWK": "Malawian Kwacha", "MXN": "Mexican Peso", "MYR": "Malaysian Ringgit", "MZN": "Mozambican Metical", "NAD": "Namibian Dollar", "NGN": "Nigerian Naira", "NIO": "Nicaraguan Cordoba", "NOK": "Norwegian Krone", "NPR": "Nepalese Rupee", "NZD": "New Zealand Dollar", "OMR": "Omani Rial", "PAB": "Panamanian Balboa", "PEN": "Peruvian Sol", "PGK": "Papua New Guinean Kina", "PHP": "Philippine Peso", "PKR": "Pakistani Rupee", "PLN": "Polish Zloty", "PYG": "Paraguayan Guarani", "QAR": "Qatari Rial", "RON": "Romanian Leu", "RSD": "Serbian Dinar", "RUB": "Russian Ruble", "RWF": "Rwandan Franc", "SAR": "Saudi Riyal", "SBD": "Solomon Islands Dollar", "SCR": "Seychellois Rupee", "SDG": "Sudanese Pound", "SEK": "Swedish Krone", "SGD": "Singapore Dollar", "SHP": "Saint Helena Pound", "SLL": "Sierra Leonean Leone", "SOS": "Somali Shilling", "SRD": "Surinamese Dollar", "STN": "Sao Tome Dobra", "SVC": "Salvadoran Colon", "SYP": "Syrian Pound", "SZL": "Swazi Lilangeni", "THB": "Thai Baht", "TJS": "Tajikistani Somoni", "TMT": "Turkmenistani Manat", "TND": "Tunisian Dinar", "TOP": "Tongan Paanga", "TRY": "Turkish Lira", "TTD": "Trinidad Dollar", "TWD": "New Taiwan Dollar", "TZS": "Tanzanian Shilling", "UAH": "Ukrainian Hryvnia", "UGX": "Ugandan Shilling", "USD": "US Dollar", "UYU": "Uruguayan Peso", "UZS": "Uzbekistan Som", "VES": "Venezuelan Bolivar", "VND": "Vietnamese Dong", "VUV": "Vanuatu Vatu", "WST": "Samoan Tala", "XAF": "CFA Franc BEAC", "XCD": "East Caribbean Dollar", "XOF": "CFA Franc BCEAO", "XPF": "CFP Franc", "YER": "Yemeni Rial", "ZAR": "South African Rand", "ZMW": "Zambian Kwacha", "ZWL": "Zimbabwean Dollar"};
var W            = "fx_jpy_usd";
var API          = "https://api.frankfurter.dev/v2";

var DATE_5Y = (function() {
  var d = new Date(); d.setFullYear(d.getFullYear() - 5);
  return d.toISOString().slice(0, 10);
})();

// ---- State ----
var RATES    = {};   // code -> rate vs jpy (jpy=1.0)
var HIST     = {};   // code -> { dates:[], values:[], from5y:bool }
var fetching = {};   // dedup in-flight fetches keyed by code
var chartBuilt = false;
var fxChart    = null;
var per        = 1825;  // active period in days (default 5Y)
var _rawDates  = [];

// ---- Helpers ----
function $el(id)  { return document.getElementById(W + "_" + id); }
function chartOpen() { return $el("cbody").style.display === "block"; }

function fmt(n) {
  if (n == null || isNaN(n)) return "—";
  if (n >= 10000) return n.toLocaleString("en-US", {maximumFractionDigits: 2});
  if (n >= 100)   return n.toFixed(2);
  if (n >= 1)     return n.toFixed(4);
  return n.toFixed(6);
}

function show(id, on) { var e = $el(id); if (e) e.style.display = on ? "block" : "none"; }

function xRate(a, b) {
  if (RATES[a] == null || RATES[b] == null) return null;
  return RATES[b] / RATES[a];
}

// ---- v2 parsers ----
function parseLatestInto(arr) {
  RATES["JPY"] = 1.0;
  for (var i = 0; i < arr.length; i++) RATES[arr[i].quote] = arr[i].rate;
}

function parseHistoryInto(code, arr) {
  var dateMap = {};
  for (var i = 0; i < arr.length; i++) dateMap[arr[i].date] = arr[i].rate;
  var dates  = Object.keys(dateMap).sort();
  var values = dates.map(function(d) { return dateMap[d]; });
  HIST[code] = { dates: dates, values: values, from5y: true };
}

// ---- Get aligned date+value series for a pair ----
// jpy is synthetic (always 1.0), uses the other currency's date axis.
function getHistPair(f, t) {
  var fE = HIST[f], tE = HIST[t];
  if (f === "JPY" && tE) return { dates: tE.dates, fromVals: tE.dates.map(function() { return 1.0; }), toVals: tE.values };
  if (t === "JPY" && fE) return { dates: fE.dates, fromVals: fE.values, toVals: fE.dates.map(function() { return 1.0; }) };
  if (!fE || !tE) return null;
  // Intersect date axes
  var tSet = {};
  for (var i = 0; i < tE.dates.length; i++) tSet[tE.dates[i]] = tE.values[i];
  var dates = [], fVals = [], tVals = [];
  for (var j = 0; j < fE.dates.length; j++) {
    var d = fE.dates[j];
    if (tSet[d] !== undefined) { dates.push(d); fVals.push(fE.values[j]); tVals.push(tSet[d]); }
  }
  return { dates: dates, fromVals: fVals, toVals: tVals };
}

// ---- History fetching — lazy, deduplicated, 5Y only ----
function fetchHist(code) {
  if (code === "jpy") return Promise.resolve();
  if (HIST[code] && HIST[code].from5y) return Promise.resolve();
  if (fetching[code]) return fetching[code];

  var p = fetch(API + "/rates?from=" + DATE_5Y + "&base=jpy&quotes=" + code)
    .then(function(r) { return r.json(); })
    .then(function(arr) {
      parseHistoryInto(code, arr);
      if (RATES[code] == null && arr.length) RATES[code] = arr[arr.length - 1].rate;
      delete fetching[code];
    })
    .catch(function(e) {
      console.error("[FX] hist error " + code + ":", e);
      if (!HIST[code]) HIST[code] = { dates: [], values: [], from5y: true };
      delete fetching[code];
    });

  fetching[code] = p;
  return p;
}

function fetchPairHist(f, t) {
  return Promise.all([fetchHist(f), fetchHist(t)]);
}

// ---- Stage 1: latest rate for default pair ----
function fetchDefaultRates() {
  var needed = [DEFAULT_FROM, DEFAULT_TO].filter(function(c) { return c !== "jpy"; });
  var qs = needed.length ? "?base=jpy&quotes=" + needed.join(",") : "?base=jpy&quotes=USD";
  fetch(API + "/rates" + qs)
    .then(function(r) { return r.json(); })
    .then(function(arr) {
      parseLatestInto(arr);
      updateDisplay();
      // Stage 2: 5Y history for default pair
      fetchPairHist(DEFAULT_FROM, DEFAULT_TO).then(function() {
        if (chartOpen()) tryRenderChart();
      });
      // Stage 3: all current rates for full dropdown conversions
      fetch(API + "/rates?base=jpy")
        .then(function(r) { return r.json(); })
        .then(function(arr) { parseLatestInto(arr); })
        .catch(function(e) { console.error("[FX] all-rates error:", e); });
    })
    .catch(function(e) {
      $el("rval").classList.remove("loading-pulse");
      $el("rval").textContent  = "Error";
      $el("rmeta").textContent = "Could not load rates";
      console.error("[FX] Stage 1 error:", e);
    });
}

// ---- Display ----
function updateDisplay() {
  var f = $el("from").value, t = $el("to").value;
  var amt = parseFloat($el("fromv").value) || 1;
  var rate = xRate(f, t);
  var rv = $el("rval");
  if (rate == null) {
    rv.textContent = "—";
    $el("rmeta").textContent = (RATES[f] == null || RATES[t] == null) ? "Loading…" : "Rate unavailable";
    return;
  }
  rv.classList.remove("loading-pulse");
  var result = amt * rate;
  var lbl = fmt(amt) + " " + f + " =";
  if ($el("rlbl"))     $el("rlbl").textContent     = lbl;
  if ($el("rlbl_mob")) $el("rlbl_mob").textContent = lbl;
  rv.textContent           = fmt(result);
  $el("rmeta").textContent = t + "  ·  1 " + f + " = " + fmt(rate) + " " + t;
  $el("tov").value         = result.toFixed(6);
}

// ---- Chart ----
function tickLimit() {
  if (per >= 1825) return 6;
  if (per >= 365)  return 7;
  if (per >= 180)  return 6;
  if (per >= 90)   return 4;
  return 5;
}

function fmtTick(dateStr) {
  var p = dateStr.split("-");
  var yr = p[0], mo = parseInt(p[1], 10) - 1, dom = parseInt(p[2], 10);
  var M = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  if (per >= 1825) return yr;
  if (per >= 90)   return M[mo] + " " + yr;
  return M[mo] + " " + dom;
}

function tryRenderChart() {
  var f = $el("from").value, t = $el("to").value;
  $el("ctitle").textContent = f + "/" + t;

  var pair = getHistPair(f, t);
  if (!pair || !pair.dates.length) {
    show("chartNoData", true); show("chartArea", false);
    $el("noDataMsg").textContent = "Loading history…";
    return;
  }

  show("chartNoData", false); show("chartArea", true);

  // Slice to the selected period
  var startIdx = 0;
  if (per < 1825) {
    var lastMs = new Date(pair.dates[pair.dates.length - 1]).getTime();
    var cutMs  = lastMs - per * 86400000;
    var lo = 0, hi = pair.dates.length - 1;
    while (lo < hi) {
      var mid = (lo + hi) >> 1;
      if (new Date(pair.dates[mid]).getTime() < cutMs) lo = mid + 1; else hi = mid;
    }
    startIdx = lo;
  }

  var ds    = pair.dates.slice(startIdx);
  var fVals = pair.fromVals.slice(startIdx);
  var tVals = pair.toVals.slice(startIdx);
  var data  = fVals.map(function(v, i) {
    return (v != null && tVals[i] != null) ? +((tVals[i] / v).toFixed(5)) : null;
  });
  _rawDates = ds;

  if (!chartBuilt) {
    buildChart(ds.slice(), data);
    chartBuilt = true;
  } else {
    fxChart.data.labels = ds.slice();
    fxChart.data.datasets[0].data = data;
    fxChart.options.scales.x.ticks.maxTicksLimit = tickLimit();
    fxChart.update();
  }
}

function buildChart(labels, data) {
  var ctx = document.getElementById(W + "_c").getContext("2d");
  fxChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        data: data,
        borderColor: "#52B788",
        borderWidth: 1.5,
        fill: true,
        backgroundColor: function(c) {
          var g = c.chart.ctx.createLinearGradient(0, 0, 0, 150);
          g.addColorStop(0, "rgba(82,183,136,0.15)");
          g.addColorStop(1, "rgba(82,183,136,0)");
          return g;
        },
        pointRadius: 0,
        pointHoverRadius: 4,
        pointHoverBackgroundColor: "#52B788",
        tension: 0.3,
        spanGaps: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#1E4034",
          titleColor: "rgba(201,212,197,0.9)",
          bodyColor: "#fff",
          titleFont: { size: 10 },
          bodyFont: { size: 12, weight: "500" },
          padding: 9,
          displayColors: false,
          callbacks: {
            title: function(items) { return _rawDates[items[0].dataIndex] || ""; },
            label: function(item) {
              var f = $el("from").value, t = $el("to").value;
              return item.raw == null ? "—" : " 1 " + f + " = " + item.raw + " " + t;
            }
          }
        }
      },
      scales: {
        x: {
          type: "category",
          grid: { display: false },
          border: { display: false },
          ticks: {
            color: "#8C8C8C",
            font: { size: 9 },
            maxRotation: 0,
            autoSkip: true,
            autoSkipPadding: 12,
            maxTicksLimit: tickLimit(),
            callback: function(val) {
              var dateStr = this.getLabelForValue(val);
              return dateStr ? fmtTick(dateStr) : "";
            }
          }
        },
        y: {
          position: "right",
          grid: { color: "#F2F2F2" },
          border: { display: false },
          ticks: { color: "#8C8C8C", font: { size: 9 }, maxTicksLimit: 5 }
        }
      }
    }
  });
}

// ---- Interactions ----
window[W + "_fwd"] = function() {
  var amt = parseFloat($el("fromv").value), rate = xRate($el("from").value, $el("to").value);
  if (!rate || isNaN(amt)) return;
  $el("tov").value = (amt * rate).toFixed(6); updateDisplay();
};

window[W + "_rev"] = function() {
  var amt = parseFloat($el("tov").value), rate = xRate($el("to").value, $el("from").value);
  if (!rate || isNaN(amt)) return;
  $el("fromv").value = (amt * rate).toFixed(6); updateDisplay();
};

window[W + "_go"] = function() {
  var f = $el("from").value, t = $el("to").value;
  updateDisplay();
  if (!chartOpen()) return;
  var fReady = f === "JPY" || (HIST[f] && HIST[f].from5y);
  var tReady = t === "JPY" || (HIST[t] && HIST[t].from5y);
  if (fReady && tReady) {
    tryRenderChart();
  } else {
    show("chartNoData", true); show("chartArea", false);
    $el("noDataMsg").textContent = "Loading history…";
    fetchPairHist(f, t).then(function() {
      if ($el("from").value === f && $el("to").value === t) tryRenderChart();
    });
  }
};

window[W + "_swap"] = function() {
  var f = $el("from").value, t = $el("to").value;
  var fs = $el("from"), ts = $el("to");
  for (var i = 0; i < fs.options.length; i++) if (fs.options[i].value === t) { fs.selectedIndex = i; break; }
  for (var i = 0; i < ts.options.length; i++) if (ts.options[i].value === f) { ts.selectedIndex = i; break; }
  window[W + "_go"]();
};

window[W + "_toggleChart"] = function() {
  var body = $el("cbody"), chev = $el("chev");
  var isOpen = body.style.display === "block";
  body.style.display   = isOpen ? "none" : "block";
  chev.style.transform = isOpen ? "" : "rotate(180deg)";
  if (!isOpen) window[W + "_go"]();
};

window[W + "_per"] = function(days, btn) {
  per = days;
  var btns = document.querySelectorAll("#fx_jpy_usd .fx-pbtn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("on");
  btn.classList.add("on");
  tryRenderChart();
};

// ---- Boot ----
(function() {
  var fs = $el("from"), ts = $el("to");
  for (var i = 0; i < fs.options.length; i++) if (fs.options[i].value === DEFAULT_FROM) { fs.selectedIndex = i; break; }
  for (var i = 0; i < ts.options.length; i++) if (ts.options[i].value === DEFAULT_TO)   { ts.selectedIndex = i; break; }
})();
fetchDefaultRates();

})();
</script>
