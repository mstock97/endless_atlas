<script>
    function sendHeight() {
        // Use document.body to get the height of simple pages
        const trueHeight = document.body.scrollHeight;
        window.parent.postMessage({ height: trueHeight }, '*'); 
    }

    const observer = new ResizeObserver(() => sendHeight());

    window.onload = () => {
        observer.observe(document.body);
        setTimeout(sendHeight, 100);
    };
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
/* ── tokens ── */
:root {
  --forest:    #1E4034;
  --canopy:    #2D6A4F;
  --moss:      #52B788;
  --driftwood: #A8896A;
  --fog:       #C9D4C5;
  --ink:       #0F0F0F;
  --graphite:  #3D3D3D;
  --ash:       #8C8C8C;
  --cloud:     #EFEFEF;
  --paper:     #F7F5F0;
  --white:     #FFFFFF;
  --forest-06: #F4F7F6;
  --forest-10: #ECF0EF;
  --moss-15:   #E2F2EB;
  --drift-15:  #F3EBE2;

  --f-display:  'Bebas Neue','Arial Black','Impact',sans-serif;
  --f-body:     'DM Sans','Helvetica Neue',Arial,sans-serif;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }

body {
  font-family: var(--f-body);
  font-size: 13px;
  line-height: 1.5;
  color: var(--graphite);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
}

/* ── thin title bar ── */
.top-bar {
  background: var(--forest);
  padding: 8px 16px;
  border-bottom: 2px solid var(--canopy);
}

.top-title {
  font-family: var(--f-display);
  font-size: 18px;
  letter-spacing: 0.12em;
  color: var(--white);
  line-height: 1;
}

/* ── status strip ── */
.status {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  font-size: 11px;
  font-weight: 500;
}
.status.show { display: flex; }
.status.loading { background: var(--forest-10); color: var(--canopy); }
.status.error   { background: #FFF5EA; color: #7a3800; border-left: 3px solid #FF9500; }

@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 12px; height: 12px; flex-shrink: 0;
  border: 2px solid rgba(45,106,79,.2);
  border-top-color: var(--canopy);
  border-radius: 50%;
  animation: spin .65s linear infinite;
}

/* ── year divider (between years inline in the grid) ── */
.year-divider {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 2px 2px;
}
.year-divider-label {
  font-family: var(--f-display);
  font-size: 15px;
  letter-spacing: 0.12em;
  color: var(--ash);
  flex-shrink: 0;
}
.year-divider-line {
  flex: 1;
  height: 1px;
  background: var(--cloud);
}

/* ── legend ── */
.legend {
  display: none;
  padding: 6px 16px 2px;
  gap: 12px;
  flex-wrap: wrap;
}
.legend.show { display: flex; }

.leg-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ash);
}
.leg-dot {
  width: 9px; height: 9px;
  border-radius: 50%; flex-shrink: 0;
}
.dot-a { background: var(--canopy); }
.dot-o { background: var(--driftwood); }

/* ── calendar ── */
.cal-wrap {
  padding: 8px 16px 4px;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

@media (max-width: 680px) {
  .cal-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 360px) {
  .cal-grid { grid-template-columns: 1fr 1fr; }
}

.month-card {
  background: var(--white);
  border: 1px solid var(--cloud);
  border-radius: 2px;
  /* Do NOT set overflow:hidden — that clips tooltips */
}

.month-head {
  background: var(--forest);
  padding: 5px 8px 4px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-radius: 2px 2px 0 0;
}

.month-name {
  font-family: var(--f-display);
  font-size: 12px;
  letter-spacing: 0.1em;
  color: var(--white);
  line-height: 1;
}

/* ── additional years container ── */
.additional-years {
  margin-top: 10px;
}

.add-years-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--forest);
  border-radius: 2px;
  cursor: pointer;
  user-select: none;
  transition: background .12s;
}
.add-years-toggle:hover { background: var(--canopy); }

.add-years-label {
  font-family: var(--f-display);
  font-size: 14px;
  letter-spacing: 0.12em;
  color: var(--white);
  line-height: 1;
}

.add-years-meta {
  font-size: 9px;
  color: var(--fog);
  letter-spacing: 0.06em;
  margin-left: 4px;
}

.add-years-toggle .collapse-chev { color: var(--fog); }
.add-years-toggle .collapse-chev.open { transform: rotate(180deg); }

.add-years-body {
  padding-top: 8px;
}

.cal-wkdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: var(--forest-06);
  border-bottom: 1px solid var(--cloud);
}

.cal-wkday {
  text-align: center;
  padding: 3px 0;
  font-size: 8px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ash);
}

.cal-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 3px;
  gap: 1px;
  /* NO overflow:hidden here */
}

/* Square cell via padding trick */
.cal-day {
  position: relative;
  width: 100%;
  padding-top: 100%;
  border-radius: 50%;
  cursor: default;
}

.cal-day-in {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 400;
  color: var(--graphite);
  border-radius: 50%;
  line-height: 1;
}

.cal-day.empty .cal-day-in { color: transparent; }

.cal-day.is-a .cal-day-in {
  background: var(--canopy);
  color: var(--white);
  font-weight: 600;
}

.cal-day.is-o .cal-day-in {
  background: var(--driftwood);
  color: var(--white);
  font-weight: 600;
}

.cal-day.is-a.is-o .cal-day-in {
  background: linear-gradient(135deg, var(--canopy) 50%, var(--driftwood) 50%);
  color: var(--white);
  font-weight: 600;
}

.cal-day.has-tip {
  cursor: pointer;
  z-index: 1;
}
.cal-day.has-tip:hover .cal-day-in { filter: brightness(1.15); }

/* ── FIXED-POSITION TOOLTIP ── */
/* Rendered in <body>, positioned via JS on mouseenter */
#tooltip {
  display: none;
  position: fixed;
  z-index: 9999;
  background: var(--ink);
  color: var(--white);
  padding: 10px 12px;
  min-width: 165px;
  max-width: 205px;
  border-radius: 3px;
  box-shadow: 0 6px 22px rgba(0,0,0,.40);
  pointer-events: none;
  font-family: var(--f-body);
  font-size: 11px;
  line-height: 1.45;
  white-space: normal;
}

#tooltip::after {
  content: '';
  position: absolute;
  border: 6px solid transparent;
}

/* arrow pointing down (tooltip above cursor) */
#tooltip.arrow-down::after {
  top: 100%;
  left: var(--arrow-x, 50%);
  transform: translateX(-50%);
  border-top-color: var(--ink);
}

/* arrow pointing up (tooltip below cursor) */
#tooltip.arrow-up::after {
  bottom: 100%;
  left: var(--arrow-x, 50%);
  transform: translateX(-50%);
  border-bottom-color: var(--ink);
}

.tip-name {
  font-size: 11px;
  font-weight: 500;
  color: var(--white);
  line-height: 1.3;
  margin-bottom: 5px;
}

.tip-hr {

}

.tip-row {

  justify-content: space-between;
  gap: 8px;
  font-size: 9.5px;
  margin-top: 2px;
}
.tip-k { color: var(--ash); flex-shrink: 0; }
.tip-v { color: var(--fog); text-align: right; }

.tip-pill {
  display: inline-block;
  margin-top: 6px;
  padding: 2px 7px;
  font-size: 8px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-radius: 2px;
}
.pill-a { background: var(--canopy); color: var(--white); }
.pill-o { background: var(--driftwood); color: var(--white); }

/* ── collapsible list ── */
.list-section { padding: 6px 16px 20px; display: none; }
.list-section.show { display: block; }

.list-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 12px;
  background: var(--forest-06);
  border: 1px solid var(--cloud);
  border-bottom: none;
  border-radius: 2px 2px 0 0;
  font-family: var(--f-body);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ash);
  cursor: pointer;

.list-tbl {

.list-tbl thead tr { background: var(--forest); }
.list-tbl thead th {

.list-tbl tbody tr { border-bottom: 1px solid var(--cloud); }
.list-tbl tbody tr:last-child { border-bottom: none; }
.list-tbl tbody tr:hover { background: var(--forest-06); }

.list-tbl td { padding: 6px 10px; color: var(--graphite); vertical-align: middle; }

.td-date { white-space: nowrap; color: var(--ash); font-size: 10px; font-weight: 300; width: 88px; }

.td-obs  { font-size: 10px; color: var(--driftwood); }

.chip {
  display: inline-block;
  margin-left: 6px;
  padding: 1px 6px;
  font-size: 7.5px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: var(--drift-15);
  color: #6a4200;
  border-radius: 2px;
  vertical-align: middle;
}

.hidden { display: none !important; }

/* ── collapse bar for hidden months ── */
.collapse-bar {
  grid-column: 1 / -1;   /* full row width */
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 12px;
  background: var(--forest-06);
  border: 1px solid var(--cloud);
  border-radius: 2px;
  cursor: pointer;
  user-select: none;
  transition: background .12s, color .12s;
  gap: 8px;
}
.collapse-bar:hover { background: var(--forest-10); }

.collapse-bar-label {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ash);
}
.collapse-bar:hover .collapse-bar-label { color: var(--canopy); }

.collapse-bar-meta {
  font-size: 9px;
  color: var(--fog);
  letter-spacing: 0.06em;
  flex: 1;
  text-align: center;
}

.collapse-chev {
  font-size: 10px;
  color: var(--ash);
  flex-shrink: 0;
}

/* hidden month cards — toggled by JS */
.month-card.collapsed { display: none; }
</style>

<script>
/* ── config ── */
var COUNTRY_NAMES = {
  US:'United States',GB:'United Kingdom',CA:'Canada',AU:'Australia',
  DE:'Germany',FR:'France',JP:'Japan',CN:'China',IN:'India',BR:'Brazil',
  MX:'Mexico',KR:'South Korea',IT:'Italy',ES:'Spain',NL:'Netherlands',
  SG:'Singapore',NZ:'New Zealand',ZA:'South Africa',NG:'Nigeria',AR:'Argentina',
  SE:'Sweden',NO:'Norway',DK:'Denmark',CH:'Switzerland',PT:'Portugal',PL:'Poland',
  TR:'Turkey',EG:'Egypt',SA:'Saudi Arabia',AE:'UAE',IL:'Israel',PH:'Philippines',
  ID:'Indonesia',TH:'Thailand',MY:'Malaysia',VN:'Vietnam',PK:'Pakistan',
  BD:'Bangladesh',KE:'Kenya',GH:'Ghana',UA:'Ukraine',RU:'Russia',CO:'Colombia',
  CL:'Chile',PE:'Peru',IE:'Ireland',BE:'Belgium',AT:'Austria',GR:'Greece',
  FI:'Finland',CZ:'Czechia',HU:'Hungary',RO:'Romania',SK:'Slovakia',HR:'Croatia',
  RS:'Serbia',BG:'Bulgaria',LU:'Luxembourg',IS:'Iceland',EE:'Estonia',LV:'Latvia',
  LT:'Lithuania',SI:'Slovenia',CY:'Cyprus',MT:'Malta',MA:'Morocco',TN:'Tunisia',
  ET:'Ethiopia',TZ:'Tanzania',UG:'Uganda',ZW:'Zimbabwe',CM:'Cameroon',
  CI:'Ivory Coast',SN:'Senegal',DZ:'Algeria',AO:'Angola',MZ:'Mozambique',
  ZM:'Zambia',EC:'Ecuador',VE:'Venezuela',BO:'Bolivia',PY:'Paraguay',UY:'Uruguay',
  PA:'Panama',CR:'Costa Rica',GT:'Guatemala',HN:'Honduras',SV:'El Salvador',
  NI:'Nicaragua',CU:'Cuba',DO:'Dominican Republic',JM:'Jamaica',HT:'Haiti',
  LK:'Sri Lanka',NP:'Nepal',MM:'Myanmar',KH:'Cambodia',LA:'Laos',TW:'Taiwan',
  HK:'Hong Kong',MN:'Mongolia',KZ:'Kazakhstan',UZ:'Uzbekistan',AZ:'Azerbaijan',
  GE:'Georgia',AM:'Armenia',JO:'Jordan',LB:'Lebanon',IQ:'Iraq',IR:'Iran',
  KW:'Kuwait',QA:'Qatar',BH:'Bahrain',OM:'Oman',YE:'Yemen',LY:'Libya',SD:'Sudan'
};

var MONTHS  = ['January','February','March','April','May','June',
               'July','August','September','October','November','December'];
var MSHORT  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var DSHORT  = ['Su','Mo','Tu','We','Th','Fr','Sa'];
var DFULL   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

var store = {};  /* { year: [holidays] } */

/* ── helpers ── */
function pad(n) { return n < 10 ? '0'+n : ''+n; }
function fmtDate(s) {
  var p = s.split('-');
  return MSHORT[+p[1]-1] + ' ' + +p[2] + ', ' + p[0];
}
function dayName(s) {
  var p = s.split('-').map(Number);
  return DFULL[new Date(p[0], p[1]-1, p[2]).getDay()];
}
function $(id) { return document.getElementById(id); }
function show(id) { $(id).classList.remove('hidden'); }
function hide(id) { $(id).classList.add('hidden'); }

function setStatus(type, msg) {
  var el = $('status');
  el.className = 'status show ' + type;
  $('status-msg').textContent = msg;
  $('spinner').style.display = type === 'loading' ? 'block' : 'none';
}
function clearStatus() { $('status').className = 'status'; }

/* ── tooltip (fixed position, lives in <body>) ── */
var tipEl      = $('tooltip');
var tipTarget  = null;

function showTip(cell, html) {
  tipEl.innerHTML = html;
  tipEl.style.display = 'block';
  tipEl.className = '';   /* clear old arrow class */
  positionTip(cell);
}

function hideTip() {
  tipEl.style.display = 'none';
  tipEl.className = '';
  tipTarget = null;
}

function positionTip(cell) {
  var cr  = cell.getBoundingClientRect();
  var tw  = tipEl.offsetWidth  || 185;
  var th  = tipEl.offsetHeight || 120;
  var vw  = window.innerWidth;
  var vh  = window.innerHeight;
  var pad = 8;

  /* Preferred: above the cell */
  var spaceAbove = cr.top;
  var spaceBelow = vh - cr.bottom;
  var above = spaceAbove >= th + pad || spaceAbove >= spaceBelow;

  /* Horizontal: center on cell, clamp to viewport */
  var cellCx  = cr.left + cr.width / 2;
  var left    = cellCx - tw / 2;
  left = Math.max(pad, Math.min(left, vw - tw - pad));

  /* Arrow x relative to tooltip box */
  var arrowX  = Math.max(12, Math.min(cellCx - left, tw - 12));
  tipEl.style.setProperty('--arrow-x', arrowX + 'px');

  if (above) {
    tipEl.className = 'arrow-down';
    tipEl.style.top  = (cr.top - th - pad) + 'px';
    tipEl.style.left = left + 'px';
  } else {
    tipEl.className = 'arrow-up';
    tipEl.style.top  = (cr.bottom + pad) + 'px';
    tipEl.style.left = left + 'px';
  }
}

/* reposition on scroll/resize without closing */
window.addEventListener('scroll', function() {
  if (tipTarget) positionTip(tipTarget);
}, true);
window.addEventListener('resize', function() {
  if (tipTarget) positionTip(tipTarget);
});
/* dismiss tooltip on touch outside a holiday cell */
document.addEventListener('touchstart', function(e) {
  if (tipTarget && !tipTarget.contains(e.target)) {
    hideTip();
  }
}, { passive: true });

/* ── re-render grid when desktop ↔ mobile breakpoint is crossed — see listener below ── */

/* ── fetch ── */
function fetchYear(code, yr) {
  return fetch('https://tallyfy.com/national-holidays/api/' + code + '/' + yr + '.json')
    .then(function(r) { if (!r.ok) throw new Error(); return r.json(); });
}

/* ── visible window — mirrors CSS breakpoint exactly ── */
function visibleCount() {
  /* must match the CSS @media (max-width: 680px) breakpoint */
  return window.matchMedia('(max-width: 680px)').matches ? 2 : 4;
}

/* ── build one month card (no grid insertion) ── */
function buildMonthCard(year, mo, holidays, actMap, obsMap) {
  var firstDow    = new Date(year, mo, 1).getDay();
  var daysInMonth = new Date(year, mo+1, 0).getDate();
  var actualsHere = holidays.filter(function(h) {
    return parseInt(h.date.split('-')[1], 10) - 1 === mo;
  });

  var card = document.createElement('div');
  card.className   = 'month-card';
  card.dataset.mo  = mo;
  card.dataset.yr  = year;

  var head = document.createElement('div');
  head.className = 'month-head';
  head.innerHTML = '<span class="month-name">' + MONTHS[mo].toUpperCase() + '</span>';
  card.appendChild(head);

  var wkr = document.createElement('div');
  wkr.className = 'cal-wkdays';
  DSHORT.forEach(function(d) {
    var s = document.createElement('span');
    s.className = 'cal-wkday';
    s.textContent = d;
    wkr.appendChild(s);
  });
  card.appendChild(wkr);

  var dg = document.createElement('div');
  dg.className = 'cal-days';

  for (var e = 0; e < firstDow; e++) {
    var em = document.createElement('div');
    em.className = 'cal-day empty';
    em.innerHTML = '<div class="cal-day-in"></div>';
    dg.appendChild(em);
  }

  for (var d = 1; d <= daysInMonth; d++) {
    var ds     = year + '-' + pad(mo+1) + '-' + pad(d);
    var actH   = actMap[ds] || [];
    var obsAll = obsMap[ds] || [];
    var obsOth = obsAll.filter(function(h) { return actH.indexOf(h) === -1; });
    var isA    = actH.length > 0;
    var isO    = obsOth.length > 0;

    var cell = document.createElement('div');
    cell.className = 'cal-day';
    if (isA) cell.classList.add('is-a');
    if (isO) cell.classList.add('is-o');

    var inner = document.createElement('div');
    inner.className   = 'cal-day-in';
    inner.textContent = d;
    cell.appendChild(inner);

    if (isA || isO) {
      cell.classList.add('has-tip');
      var html = '';
      var first = true;

      actH.forEach(function(h) {
        if (!first) html += '<hr class="tip-hr">';
        first = false;
        var sh = h.is_observed_shifted;
        html +=
          '<div class="tip-name">' + h.name + '</div>' +
          '<div class="tip-row"><span class="tip-k">Date</span><span class="tip-v">' + fmtDate(h.date) + '</span></div>' +
          '<div class="tip-row"><span class="tip-k">Day</span><span class="tip-v">' + dayName(h.date) + '</span></div>';
        if (sh) {
          html +=
            '<div class="tip-row"><span class="tip-k">Observed</span><span class="tip-v">' + fmtDate(h.observed_date) + '</span></div>' +
            '<span class="tip-pill pill-s">Observed ' + dayName(h.observed_date) + '</span>';
        } else {
          html += '<span class="tip-pill pill-a">Actual date</span>';
        }
      });

      obsOth.forEach(function(h) {
        if (!first) html += '<hr class="tip-hr">';
        first = false;
        html +=
          '<div class="tip-name">' + h.name + '</div>' +
          '<div class="tip-row"><span class="tip-k">Actual</span><span class="tip-v">' + fmtDate(h.date) + '</span></div>' +
          '<div class="tip-row"><span class="tip-k">Observed</span><span class="tip-v">' + fmtDate(h.observed_date) + '</span></div>' +
          '<span class="tip-pill pill-o">Observed here</span>';
      });

      (function(c, h) {
        /* mouse */
        c.addEventListener('mouseenter', function() { tipTarget = c; showTip(c, h); });
        c.addEventListener('mouseleave', function() { hideTip(); });
        /* touch — tap to show; tapping anywhere else hides (see global touchstart below) */
        c.addEventListener('touchstart', function(e) {
          e.preventDefault(); /* stop synthetic mouse events firing too */
          if (tipTarget === c) {
            hideTip();         /* second tap on same cell = dismiss */
          } else {
            tipTarget = c;
            showTip(c, h);
          }
        }, { passive: false });
      })(cell, html);
    }

    dg.appendChild(cell);
  }

  card.appendChild(dg);
  return card;
}

/* ── collapse bar factory — one-way reveal, no toggle back ── */
var barIdSeq = 0;
function makeCollapseBar(label, metaText, cards) {
  var bar = document.createElement('div');
  bar.className = 'collapse-bar';
  bar.innerHTML =
    '<span class="collapse-bar-label">' + label + '</span>' +
    '<span class="collapse-bar-meta">' + metaText + '</span>' +
    '<span class="collapse-chev">▼</span>';

  bar.addEventListener('click', function() {
    /* reveal all cards */
    cards.forEach(function(c) { c.classList.remove('collapsed'); });
    /* remove the bar itself — no going back */
    bar.parentNode.removeChild(bar);
  });
  return bar;
}

/* ── collapse meta string ── */
function barMeta(cards, holidays) {
  if (!cards.length) return '';
  var first = MONTHS[parseInt(cards[0].dataset.mo, 10)];
  var last  = MONTHS[parseInt(cards[cards.length-1].dataset.mo, 10)];
  var range = cards.length === 1 ? first : first + ' – ' + last;
  var hols  = 0;
  cards.forEach(function(c) {
    var m = parseInt(c.dataset.mo, 10);
    hols += holidays.filter(function(h) {
      return parseInt(h.date.split('-')[1], 10) - 1 === m;
    }).length;
  });
  return range + ' · ' + cards.length + ' month' + (cards.length !== 1 ? 's' : '') +
         (hols ? ' · ' + hols + ' holiday' + (hols !== 1 ? 's' : '') : '');
}

/* ── toggle additional years panel ── */
function toggleAdditionalYears() {
  var body = $('add-years-body');
  var chev = $('add-years-chev');
  var open = body.style.display === 'none';
  body.style.display = open ? 'block' : 'none';
  chev.classList.toggle('open', open);
}

/* ── init — fetch current year immediately, discover & stream the rest ── */
(function init() {
  var now  = new Date().getFullYear();
  var code = DEFAULT_COUNTRY || 'US';

  /* We don't hardcode the max year — instead we probe upward from now+1
     until the API returns a 404, then stop. Each successful year is streamed
     into the UI as it arrives. Max probe cap: now+10 to avoid runaway.      */
  var MAX_PROBE = now + 10;

  setStatus('loading', 'Loading…');

  /* ── sentinel anchors for the current-year grid ── */
  var mainGrid   = $('cal-grid');
  var mainAnchor = {};
  /* Just one anchor for the current year in the main grid */
  (function() {
    var a = document.createElement('div');
    a.style.display = 'contents';
    mainGrid.appendChild(a);
    mainAnchor[now] = a;
  })();

  function insertAtMainAnchor(yr, nodes) {
    var anchor = mainAnchor[yr];
    if (!anchor) return;
    nodes.forEach(function(n) { anchor.parentNode.insertBefore(n, anchor); });
  }

  /* ── sentinel anchors for the extra-years grid (inserted as years are discovered) ── */
  var extraGrid    = $('extra-cal-grid');
  var extraAnchors = {};
  var extraYears   = []; /* years confirmed available beyond now */

  function ensureExtraAnchor(yr) {
    if (extraAnchors[yr]) return;
    var a = document.createElement('div');
    a.style.display = 'contents';
    extraGrid.appendChild(a);
    extraAnchors[yr] = a;
    extraYears.push(yr);
    extraYears.sort(function(a,b){ return a-b; });
  }

  function insertAtExtraAnchor(yr, nodes) {
    var anchor = extraAnchors[yr];
    if (!anchor) return;
    nodes.forEach(function(n) { anchor.parentNode.insertBefore(n, anchor); });
  }

  /* ── list ordering helper — shared table in list-body ── */
  function insertAtListAnchor(year) {
    var hols = store[year] || [];
    if (!hols.length) return;
    $('list-section').className = 'list-section show';

    var body = $('list-body');
    var tbl  = body.querySelector('table.list-tbl');
    if (!tbl) {
      tbl = document.createElement('table');
      tbl.className = 'list-tbl';
      var cg = document.createElement('colgroup');
      cg.innerHTML =
        '<col style="width:92px"><col><col style="width:80px"><col style="width:92px">';
      tbl.appendChild(cg);
      tbl.createTHead().innerHTML =
        '<tr><th>Date</th><th>Holiday</th><th>Day</th><th>Observed</th></tr>';
      tbl.createTBody();
      body.insertBefore(tbl, body.firstChild);
    }

    var tb = tbl.querySelector('tbody');
    /* find insert-before position: first sep row with yr > this year */
    var insertBefore = null;
    var rows = tb.rows;
    for (var i = 0; i < rows.length; i++) {
      if (rows[i].dataset.yr && parseInt(rows[i].dataset.yr, 10) > year) {
        insertBefore = rows[i]; break;
      }
    }

    var sepRow = document.createElement('tr');
    sepRow.className   = 'list-yr-row';
    sepRow.dataset.yr  = year;
    var sepCell        = document.createElement('td');
    sepCell.colSpan    = 4;
    sepCell.className  = 'list-yr-cell';
    sepCell.textContent = year;
    sepRow.appendChild(sepCell);

    var newRows = [sepRow];
    hols.forEach(function(h) {
      var sh = h.is_observed_shifted;
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="td-date">' + fmtDate(h.date) + '</td>' +
        '<td class="td-name">' + h.name + (sh ? '<span class="chip">Shifted</span>' : '') + '</td>' +
        '<td class="td-day">'  + dayName(h.observed_date || h.date) + '</td>' +
        '<td class="td-obs">'  + (sh ? fmtDate(h.observed_date) : '—') + '</td>';
      newRows.push(tr);
    });
    newRows.forEach(function(r) {
      insertBefore ? tb.insertBefore(r, insertBefore) : tb.appendChild(r);
    });
  }

  /* ── update the "Additional Years" meta label ── */
  function updateExtraMeta() {
    if (!extraYears.length) return;
    var first = extraYears[0];
    var last  = extraYears[extraYears.length - 1];
    $('add-years-meta').textContent = first === last ? first : first + ' – ' + last;
    $('additional-years').style.display = 'block';
  }

  /* ── fetch current year first ── */
  fetchYear(code, now)
    .then(function(d) {
      store[now] = d.holidays || [];
      clearStatus();
      $('legend').className = 'legend show';
      appendYearToGrid(now, true, insertAtMainAnchor);
      insertAtListAnchor(now);
      $('list-section').className = 'list-section show';
    })
    .catch(function() {
      store[now] = [];
      clearStatus();
      setStatus('error', 'Could not load data.');
    });

  /* ── probe & stream future years ── */
  (function probeNext(yr) {
    if (yr > MAX_PROBE) return;
    fetchYear(code, yr)
      .then(function(d) {
        store[yr] = d.holidays || [];
        ensureExtraAnchor(yr);
        appendYearToGrid(yr, false, insertAtExtraAnchor);
        insertAtListAnchor(yr);
        updateExtraMeta();
        probeNext(yr + 1); /* only probe next if this one succeeded */
      })
      .catch(function() {
        /* 404 or error — stop probing, this year doesn't exist yet */
      });
  })(now + 1);

})();

/* ── append a single year's calendar section at its reserved anchor ── */
function appendYearToGrid(year, isFirstYear, insertAt) {
  var holidays = store[year] || [];

  var today      = new Date();
  var todayYear  = today.getFullYear();
  var todayMonth = today.getMonth();
  var showN      = visibleCount();

  /* build lookup maps */
  var actMap = {}, obsMap = {};
  holidays.forEach(function(h) {
    if (!actMap[h.date]) actMap[h.date] = [];
    actMap[h.date].push(h);
    if (h.is_observed_shifted) {
      if (!obsMap[h.observed_date]) obsMap[h.observed_date] = [];
      obsMap[h.observed_date].push(h);
    }
  });

  var beforeCards  = [];
  var visibleCards = [];
  var afterCards   = [];

  for (var mo = 0; mo < 12; mo++) {
    var card = buildMonthCard(year, mo, holidays, actMap, obsMap);
    if (isFirstYear) {
      if (mo < todayMonth) {
        card.classList.add('collapsed');
        beforeCards.push(card);
      } else if (mo <= Math.min(11, todayMonth + showN - 1)) {
        visibleCards.push(card);
      } else {
        card.classList.add('collapsed');
        afterCards.push(card);
      }
    } else {
      card.classList.add('collapsed');
      afterCards.push(card);
    }
  }

  /* collect all nodes to insert in order */
  var nodes = [];

  if (isFirstYear) {
    if (beforeCards.length) {
      nodes.push(makeCollapseBar('Earlier this year', barMeta(beforeCards, holidays), beforeCards));
      beforeCards.forEach(function(c) { nodes.push(c); });
    }
    visibleCards.forEach(function(c) { nodes.push(c); });
    if (afterCards.length) {
      nodes.push(makeCollapseBar('Later this year', barMeta(afterCards, holidays), afterCards));
      afterCards.forEach(function(c) { nodes.push(c); });
    }
  } else {
    var divider = document.createElement('div');
    divider.className = 'year-divider';
    divider.style.cursor = 'pointer';
    divider.style.userSelect = 'none';

    var lbl = document.createElement('span');
    lbl.className = 'year-divider-label';
    lbl.textContent = year;

    var holCount = holidays.length;
    var hint = document.createElement('span');
    hint.style.cssText = 'font-size:9px;color:var(--fog);margin-left:8px;white-space:nowrap;letter-spacing:0.04em;';
    hint.textContent = holCount + ' holiday' + (holCount !== 1 ? 's' : '') + ' · tap to expand';

    var chev = document.createElement('span');
    chev.className = 'collapse-chev';

    var line = document.createElement('div');
    line.className = 'year-divider-line';

    divider.appendChild(lbl);
    divider.appendChild(hint);
    divider.appendChild(line);
    divider.appendChild(chev);

    divider.addEventListener('click', function onClick() {
      afterCards.forEach(function(c) { c.classList.remove('collapsed'); });
      divider.removeEventListener('click', onClick);
      divider.style.cursor = 'default';
      divider.style.userSelect = 'default';
      hint.style.display = 'none';
      chev.style.display = 'none';
    });

    nodes.push(divider);
    afterCards.forEach(function(c) { nodes.push(c); });
  }

  insertAt(year, nodes);
}

/* ── toggle list ── */
function toggleList() {
  var open = $('list-body').classList.toggle('open');
  $('chev').classList.toggle('open', open);
}

/* ── re-render both grids when desktop ↔ mobile breakpoint is crossed ── */
(function() {
  var mq = window.matchMedia('(max-width: 680px)');

  function onBreakpointChange() {
    hideTip();
    var now = new Date().getFullYear();

    /* Re-render main grid */
    var mainGrid = $('cal-grid');
    mainGrid.innerHTML = '';
    var mainAnchor = document.createElement('div');
    mainAnchor.style.display = 'contents';
    mainGrid.appendChild(mainAnchor);
    if (store[now]) {
      appendYearToGrid(now, true, function(yr, nodes) {
        nodes.forEach(function(n) { mainAnchor.parentNode.insertBefore(n, mainAnchor); });
      });
    }

    /* Re-render extra grid — collect loaded future years in sorted order */
    var extraGrid = $('extra-cal-grid');
    extraGrid.innerHTML = '';
    var futureYrs = Object.keys(store)
      .map(function(y) { return parseInt(y, 10); })
      .filter(function(y) { return y > now && store[y]; })
      .sort(function(a, b) { return a - b; });

    futureYrs.forEach(function(yr) {
      var anchor = document.createElement('div');
      anchor.style.display = 'contents';
      extraGrid.appendChild(anchor);
      appendYearToGrid(yr, false, function(y, nodes) {
        nodes.forEach(function(n) { anchor.parentNode.insertBefore(n, anchor); });
      });
    });
  }

  if (mq.addEventListener) {
    mq.addEventListener('change', onBreakpointChange);
  } else {
    mq.addListener(onBreakpointChange); /* Safari < 14 */
  }
})();
</script>
