<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essentials</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { width: 100%; background: transparent; overflow: hidden; }

    .ea-wrap {
      background: #1E4034;
      border-radius: 6px;
      overflow: hidden;
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .ea-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ea-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      color: #F7F5F0;
      letter-spacing: 0.08em;
      line-height: 1;
    }
    .ea-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      gap: 16px;
    }
    .ea-row:last-child { border-bottom: none; }
    .ea-key {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #A8896A;
      flex-shrink: 0;
    }
    .ea-val {
      font-size: 0.875rem;
      font-weight: 300;
      color: #C9D4C5;
      text-align: right;
      line-height: 1.45;
    }
    .ea-val strong {
      font-weight: 500;
      color: #F7F5F0;
    }
    .plug-block {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .plug-label {
      font-size: 0.78rem;
      font-weight: 300;
      color: #C9D4C5;
      line-height: 1.4;
      text-align: left;
    }
    .plug-label strong {
      font-weight: 500;
      color: #F7F5F0;
      display: block;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<div class="ea-wrap" id="essentialsCard">
  <div class="ea-header">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#52B788" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span class="ea-title">Essentials</span>
  </div>

  <div class="ea-row">
    <span class="ea-key">Voltage</span>
    <div class="plug-block">
      <svg width="36" height="48" viewBox="0 0 36 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="16" width="26" height="20" rx="3" fill="rgba(255,255,255,0.08)" stroke="#A8896A" stroke-width="1"/>
        <rect x="11" y="36" width="4" height="11" rx="1.5" fill="#C9D4C5"/>
        <rect x="21" y="36" width="4" height="11" rx="1.5" fill="#C9D4C5"/>
        <rect x="13" y="22" width="3" height="7" rx="1" fill="#52B788" fill-opacity="0.7"/>
        <rect x="20" y="22" width="3" height="7" rx="1" fill="#52B788" fill-opacity="0.7"/>
        <rect x="14" y="4" width="8" height="12" rx="2" fill="rgba(255,255,255,0.05)" stroke="#A8896A" stroke-width="1"/>
        <text x="18" y="12.5" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="6.5" font-weight="500" fill="#A8896A">A</text>
      </svg>
      <div class="plug-label">
        <strong>100V · Type A</strong>
        Flat parallel pins
      </div>
    </div>
  </div>

  <div class="ea-row">
    <span class="ea-key">Tipping</span>
    <span class="ea-val">Not customary — never tip</span>
  </div>

  <div class="ea-row">
    <span class="ea-key">Tap water</span>
    <span class="ea-val">Safe to drink</span>
  </div>

  <div class="ea-row">
    <span class="ea-key">Emergency</span>
    <span class="ea-val">Police <strong>110</strong> · Fire/EMS <strong>119</strong></span>
  </div>

  <div class="ea-row">
    <span class="ea-key">Language</span>
    <span class="ea-val">Japanese · Google Translate camera mode is your friend</span>
  </div>
</div>

<script>
  function postHeight() {
    const h = document.getElementById('essentialsCard').offsetHeight;
    window.parent.postMessage({ height: h }, '*');
  }
  document.fonts.ready.then(() => {
    postHeight();
    new ResizeObserver(postHeight).observe(document.getElementById('essentialsCard'));
  });
</script>

</body>
</html>
