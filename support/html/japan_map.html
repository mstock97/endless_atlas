<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Atlas - Static Navigation Map</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        /* --- Brand Variables --- */
        :root {
            --forest: #1E4034;
            --canopy: #2D6A4F;
            --moss: #528788;
            --paper: #F7F5F0;
            --ink: #0F0F0F;
        }

        /* --- Base Structure --- */
        body {
            margin: 0;
            padding: 0;
            background-color: var(--paper);
        }
        
        #map {
            height: 100vh;
            width: 100vw;
            background-color: var(--paper);
            cursor: default; 
        }

        /* --- Map Tile Styling --- */
        .leaflet-tile-pane {
            /* Fades the surrounding world into the paper background */
            filter: sepia(0.15) contrast(0.95) opacity(0.4);
        }

        /* --- Custom Marker & Link Styling --- */
        .marker-link {
            display: block;
            width: 16px;
            height: 16px;
            text-decoration: none;
            outline: none;
        }

        .brand-marker {
            width: 100%;
            height: 100%;
            background-color: var(--moss);
            border: 1.5px solid var(--paper);
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(15, 15, 15, 0.4);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .marker-link:hover .brand-marker {
            background-color: var(--canopy);
            transform: scale(1.3);
            box-shadow: 0 4px 8px rgba(15, 15, 15, 0.5);
        }

        /* --- Custom Hover Tooltip Styling --- */
        .leaflet-tooltip.brand-tooltip {
            background-color: var(--paper);
            color: var(--ink);
            border: 1.5px solid var(--forest);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 1.5px;
            padding: 4px 14px;
            border-radius: 2px;
            box-shadow: 0 6px 12px rgba(30, 64, 52, 0.15);
        }
        
        .leaflet-tooltip-top.brand-tooltip::before {
            border-top-color: var(--forest);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // 1. Initialize the map with all interactive features strictly disabled
        var map = L.map('map', {
            zoomControl: false,
            dragging: false,
            scrollWheelZoom: false,
            doubleClickZoom: false,
            boxZoom: false,
            keyboard: false,
            touchZoom: false
        });

        // 2. Define the geographic bounding box of Japan (Southwest to Northeast)
        var japanBounds = [
            [24.396308, 122.934570], 
            [45.551483, 153.986672]  
        ];

        // Frame the map to perfectly fit these coordinates on any screen size
        map.fitBounds(japanBounds, { padding: [20, 20] });

        // 3. Add the stylized CartoDB base map
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        // 4. Reusable function to create fully linked, tooltipped markers
        function createCityPin(lat, lng, cityName, slug) {
            var iconHtml = `<a href="https://endless-atlas.com/destinations/japan/${slug}" class="marker-link" aria-label="Explore ${cityName}">
                                <div class="brand-marker"></div>
                            </a>`;

            var customIcon = L.divIcon({
                className: '', 
                html: iconHtml,
                iconSize: [16, 16],
                iconAnchor: [8, 8] 
            });

            var marker = L.marker([lat, lng], {icon: customIcon}).addTo(map);

            marker.bindTooltip(cityName, {
                direction: 'top',
                className: 'brand-tooltip',
                offset: [0, -10] 
            });
        }

        // 5. Fetch Japan's GeoJSON data, color it, then place the city pins
        fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries/JPN.geo.json')
            .then(response => response.json())
            .then(data => {
                
                // Add the colored polygon of Japan to the map
                L.geoJSON(data, {
                    style: {
                        fillColor: '#1E4034', // Brand Forest
                        fillOpacity: 1,
                        color: '#F7F5F0',     // Brand Paper for borders
                        weight: 1.5
                    }
                }).addTo(map);

                // Deploy the cities AFTER the polygon loads so the pins sit on top
                createCityPin(35.6762, 139.6503, "TOKYO", "tokyo");
                createCityPin(35.0116, 135.7681, "KYOTO", "kyoto");
                createCityPin(34.6937, 135.5023, "OSAKA", "osaka");
            })
            .catch(error => {
                console.error("Error loading Japan shape:", error);
                // Fallback: Still load the pins if the shapefile fails to download
                createCityPin(35.6762, 139.6503, "TOKYO", "tokyo");
                createCityPin(35.0116, 135.7681, "KYOTO", "kyoto");
                createCityPin(34.6937, 135.5023, "OSAKA", "osaka");
            });

    </script>

</body>
</html>
