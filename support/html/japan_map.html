<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Atlas - Map</title>
    
    <style>
        /* --- Brand Variables --- */
        :root {
            --forest: #1E4034;
            --canopy: #2D6A4F;
            --moss: #528788;
            --paper: #F7F5F0;
            --graphite: #3D3D3D;
        }

        /* --- Base Structure --- */
        body {
            background-color: var(--paper);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- Map Container & SVG Styling --- */
        .map-container {
            width: 100%;
            max-width: 800px;
            position: relative;
            padding: 40px;
            box-sizing: border-box;
        }

        svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0px 10px 20px rgba(30, 64, 52, 0.15));
        }

        .landmass {
            fill: var(--forest);
            stroke: var(--paper);
            stroke-width: 1px;
            stroke-linejoin: round;
        }

        /* Interactive City Markers */
        .city-marker {
            cursor: pointer;
            text-decoration: none;
        }

        .city-marker circle {
            fill: var(--moss);
            stroke: var(--paper);
            stroke-width: 2px;
            transition: all 0.3s ease;
        }

        .city-marker:hover circle {
            fill: var(--canopy);
            r: 10; /* Expands slightly on hover */
        }
    </style>
</head>
<body>

    <div class="map-container">
        <svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
            
            <path class="landmass" d="M 500 120 Q 530 80, 580 90 Q 640 100, 650 140 Q 660 180, 600 190 Q 550 200, 520 180 Q 480 150, 500 120 Z" />
            
            <path class="landmass" d="M 480 200 Q 460 230, 440 280 Q 410 360, 330 430 Q 280 480, 200 520 Q 150 540, 180 480 Q 220 420, 280 380 Q 360 300, 400 230 Q 430 180, 480 200 Z" />
            
            <path class="landmass" d="M 280 500 Q 310 480, 330 520 Q 300 540, 280 500 Z" />
            
            <path class="landmass" d="M 160 550 Q 190 530, 210 580 Q 190 630, 150 600 Q 130 570, 160 550 Z" />
            
            <a href="/tokyo" class="city-marker">
                <circle cx="410" cy="330" r="7" />
            </a>

            <a href="/kyoto" class="city-marker">
                <circle cx="330" cy="410" r="7" />
            </a>

            <a href="/osaka" class="city-marker">
                <circle cx="310" cy="430" r="7" />
            </a>
            
        </svg>
    </div>

</body>
</html>
