<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Atlas - Interactive Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        /* Reset margins and make the map fill the entire browser window */
        body {
            margin: 0;
            padding: 0;
        }
        
        #map {
            height: 100vh;
            width: 100vw;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // 1. Initialize the map and set its view to Japan's coordinates and a zoom level of 6
        var map = L.map('map').setView([36.2048, 138.2529], 6);

        // 2. Add the base tile layer (OpenStreetMap)
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 3. Add markers for the specific cities using their exact Latitude and Longitude
        L.marker([35.6762, 139.6503]).addTo(map); // Tokyo
        L.marker([35.0116, 135.7681]).addTo(map); // Kyoto
        L.marker([34.6937, 135.5023]).addTo(map); // Osaka
    </script>

</body>
</html>
