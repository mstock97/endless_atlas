<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Travel Guide | Endless Atlas</title>
    
    <link rel="stylesheet" href="/main.css">
    
    <style>
        /* Restoring the premium Hero visuals */
        .hero-container {
            position: relative;
            height: 80vh;
            background: var(--ink);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-image {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            transition: filter 0.8s ease, transform 0.8s ease;
        }

        .hero-title {
            font-family: var(--font-accent);
            font-size: clamp(6rem, 25vw, 16rem);
            color: var(--white);
            z-index: 2;
            letter-spacing: 0.05em;
            text-align: center;
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        /* The "Geo-Pin" restoration */
        .geo-pin {
            position: absolute;
            bottom: 60px; left: 5%;
            z-index: 5;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .location-strip {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            z-index: 4;
            background: rgba(15, 25, 20, 0.85);
            backdrop-filter: blur(8px);
            height: 0;
            overflow: hidden;
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            padding: 0 5%;
        }
        .location-strip.visible { height: 50px; }

        /* Quick Facts Restoration */
        .quick-facts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1px;
            background: var(--warm-rule);
            border: 1px solid var(--warm-rule);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 3rem;
        }

        .fact-cell {
            background: var(--white);
            padding: 1.25rem;
        }

        .fact-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--ash);
            display: block;
            margin-bottom: 0.25rem;
        }

        .fact-value {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--forest);
        }
    </style>
</head>
<body>

    <div id="site-header"></div>
    <div id="japan-sub-header" class="sticky-sub-nav"></div>

    <section class="hero-container" id="heroContainer">
        <img src="https://storage.googleapis.com/blog_asset_storage_prod/japan_assets/Japan_Fuji_Hero-hd.JPG" 
             class="hero-image img-low-res" id="mainHeroImage" alt="Japan">
        
        <h1 class="hero-title" id="heroText">JAPAN</h1>

        <div class="geo-pin" id="geoPin">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="white">
                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
            </svg>
        </div>

        <div class="location-strip" id="locationStrip">
            <span style="color: white; font-size: 0.85rem;">Chureito Pagoda, Yamanashi, Japan</span>
        </div>
    </section>

    <main style="padding: 80px 10%;">
        <div class="content-grid" id="contentGrid">
            
            <article class="main-column" id="mainCol">
                <div class="quick-facts">
                    <div class="fact-cell"><span class="fact-label">Capital</span><div class="fact-value">Tokyo</div></div>
                    <div class="fact-cell"><span class="fact-label">Time</span><div class="fact-value" id="current-jst-time">--:--</div></div>
                    <div class="fact-cell"><span class="fact-label">Currency</span><div class="fact-value">JPY <span id="live-fx-rate"></span></div></div>
                </div>

                <div id="dynamic-text-block" class="description-block"></div>

                <h2 class="section-title-accent">Climate & Weather</h2>
                <div class="iframe-wrapper">
                    <iframe src="/support/html/japan_climate.html" style="width:100%; border:none; height:450px;" scrolling="no"></iframe>
                </div>
            </article>

            <aside class="support-column" id="supportCol">
                <div class="iframe-wrapper">
                    <iframe src="/support/html/japan_map.html" style="width:100%; border:none; height:400px;"></iframe>
                </div>
                
                <div style="background: var(--warm-rule); padding: 2rem; border-radius: 12px;">
                    <h3 style="font-family: var(--font-accent); color: var(--forest); margin-bottom: 1rem;">Travel Tips</h3>
                    <div id="travel-tips-content"></div>
                </div>
            </aside>
        </div>
    </main>

    <script>
        /* Refined Proportional Scroll: 
           Ensures the side column glides perfectly with the main content 
        */
        const mainCol = document.getElementById('mainCol');
        const supportCol = document.getElementById('supportCol');
        
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const heroHeight = document.getElementById('heroContainer').offsetHeight;
            
            if (window.innerWidth > 900 && scrollY > heroHeight) {
                const diff = mainCol.offsetHeight - supportCol.offsetHeight;
                const scrollRange = mainCol.offsetHeight - window.innerHeight;
                const progress = Math.min(1, (scrollY - heroHeight) / scrollRange);
                
                if (diff > 0) {
                    supportCol.style.transform = `translateY(${progress * diff}px)`;
                }
            }
        });

        // Restore Hero Parallax
        window.addEventListener('scroll', () => {
            const s = window.scrollY;
            const heroText = document.getElementById('heroText');
            heroText.style.transform = `scale(${1 + s/1000}) translateY(${s/4}px)`;
            heroText.style.opacity = 1 - (s/600);
        });

        // Simple Toggle for Geo-Pin
        const pin = document.getElementById('geoPin');
        const strip = document.getElementById('locationStrip');
        pin.addEventListener('click', () => strip.classList.toggle('visible'));
    </script>
</body>
</html>
