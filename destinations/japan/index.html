<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Travel Guide to Japan | Endless Atlas</title>
    <meta name="description" content="Explore Japan with Endless Atlas. Discover local currency (JPY), current JST time, climate data, and national holidays to plan your perfect trip.">
    <meta name="keywords" content="Japan travel, JPY exchange rate, Japan climate, Japan holidays, Endless Atlas">
    <link rel="canonical" href="https://endless-atlas.com/destinations/japan">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Japan | Endless Atlas">
    <meta property="og:description" content="Your comprehensive guide to traveling Japan. Real-time FX rates, weather data, and travel essentials.">
    <meta property="og:image" content="https://storage.googleapis.com/blog_asset_storage_prod/japan_assets/Japan_Fuji_Hero.JPG">

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/main.css">

    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --forest:    #1E4034;
            --canopy:    #2D6A4F;
            --moss:      #52B788;
            --stone:     #5C5346;
            --driftwood: #A8896A;
            --fog:       #C9D4C5;
            --ink:       #0F0F0F;
            --graphite:  #3D3D3D;
            --ash:       #8C8C8C;
            --cloud:     #EFEFEF;
            --paper:     #F7F5F0;
            --white:     #FFFFFF;
            --warm-rule: #EAE6DB;
        }

        /* ===== HEADER CONTAINERS ===== */
        #site-header {
            width: 100%;
            z-index: 1001;
            /* No sticky here so it scrolls away */
        }

        #japan-sub-header {
            width: 100%;
            z-index: 1000;
            /* Sticky logic is handled in japan-components.js */
        }

        /* ===== HERO ===== */
        .hero-container {
            position: relative;
            height: 75vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--ink);
        }

        .hero-image {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: center center;
            z-index: 0;
            transition: filter 0.8s ease-in-out, transform 0.8s ease-in-out;
            will-change: filter;
        }

        .img-low-res { filter: blur(15px); transform: scale(1.05); }
        .img-loaded  { filter: blur(0) !important; transform: scale(1) !important; }

        .hero-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 15, 15, 0.6);
            z-index: 1;
            transition: opacity 0.4s ease;
        }

        .hero-container.pin-revealed::after { opacity: 0; }

        .hero-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(5rem, 20vw, 15rem);
            color: var(--white);
            margin: 0;
            z-index: 2;
            letter-spacing: 0.05em;
            text-align: center;
            pointer-events: none;
            will-change: transform, opacity;
            transition: opacity 0.3s ease;
        }

        .geo-pin {
            position: absolute;
            bottom: 60px; left: 5%;
            z-index: 5;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .geo-pin-icon {
            width: 32px; height: 32px;
            opacity: 0.22;
            transition: opacity 0.3s ease, transform 0.3s ease;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            display: flex; align-items: center; justify-content: center;
        }

        .geo-pin-icon svg { width: 26px; height: 26px; }

        .geo-pin:hover .geo-pin-icon,
        .geo-pin.active .geo-pin-icon { opacity: 1; transform: scale(1.15); }

        .location-strip {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            z-index: 4;
            background: rgba(8, 8, 8, 0.78);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-top: 1px solid rgba(255,255,255,0.08);
            height: 0;
            overflow: hidden;
            transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            padding: 0 5%;
        }

        .location-strip.visible { height: 46px; }

        .strip-inner { display: flex; align-items: center; gap: 10px; width: 100%; }

        .strip-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            flex-shrink: 0;
        }

        .strip-text {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.8);
            flex: 1;
        }

        .strip-link {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.45);
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.18);
            padding: 0.18rem 0.6rem;
            border-radius: 20px;
            transition: color 0.2s, border-color 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ===== MAIN LAYOUT ===== */
        main {
            padding: 80px 10% 120px;
            background-color: var(--paper);
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 3rem;
            max-width: 1400px;
            margin: 0 auto;
            align-items: start;
        }

        @media (min-width: 900px) {
            .content-grid { grid-template-columns: 2fr 1fr; }
        }

        .main-column, .support-column {
            position: relative;
            z-index: 10;
            will-change: transform;
        }

        /* ===== QUICK FACTS STRIP ===== */
        .quick-facts {
            display: flex;
            flex-wrap: wrap;
            gap: 1px;
            background: var(--warm-rule);
            border: 1px solid var(--warm-rule);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 2.5rem;
        }

        .fact-cell {
            flex: 1 1 140px;
            background: var(--white);
            padding: 1.1rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .fact-label {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--ash);
        }

        .fact-value {
            font-size: 1rem;
            font-weight: 500;
            color: var(--ink);
        }

        /* ===== SECTION TITLES ===== */
        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            color: var(--forest);
            margin: 4rem 0 1.5rem 0;
            letter-spacing: 0.05em;
            border-bottom: 2px solid var(--warm-rule);
            padding-bottom: 0.5rem;
        }

        .description-block {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--graphite);
        }

        /* ===== ACCORDION ===== */
        .weather-accordion {
            margin: 4rem 0 1.5rem 0;
            border-bottom: 2px solid var(--warm-rule);
        }

        .accordion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding-bottom: 0.5rem;
        }

        .accordion-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.4s ease-in-out, margin-top 0.4s ease;
            opacity: 0;
        }

        .accordion-content.expanded {
            grid-template-rows: 1fr;
            opacity: 1;
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .accordion-inner { overflow: hidden; }

        /* ===== SUPPORT COLUMN ===== */
        .support-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            color: var(--forest);
            margin-bottom: 1rem;
            border-bottom: 1px solid #D1CDC4;
            padding-bottom: 0.5rem;
        }

        .support-iframe {
            width: 100%;
            height: 400px;
            border: none;
            border-radius: 8px;
            background-color: var(--warm-rule);
        }

        .dynamic-iframe-container {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            background-color: transparent;
        }

        .dynamic-iframe {
            width: 100%;
            border: none;
            display: block;
        }

        .travel-tips-container {
            background-color: var(--warm-rule);
            border-radius: 8px;
            padding: 1.5rem;
        }

        /* ===== MOBILE ===== */
        @media (max-width: 600px) {
            main { padding: 60px 6% 80px; }
            .geo-pin { bottom: 65px; }
        }
    </style>
</head>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-F7SKJN227T"></script>

<body>

    <div id="site-header"></div>
    
    <div id="japan-sub-header"></div>

    <section class="hero-container" id="heroContainer">
        <img src="https://storage.googleapis.com/blog_asset_storage_prod/japan_assets/Japan_Fuji_Hero-hd.JPG"
             class="hero-image img-low-res"
             id="mainHeroImage"
             alt="Mount Fuji - Japan Destination"
             referrerpolicy="no-referrer">

        <h1 class="hero-title" id="heroText">JAPAN</h1>

        <div class="geo-pin" id="geoPin" aria-label="View photo location">
            <div class="geo-pin-icon">
                <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                </svg>
            </div>
        </div>

        <div class="location-strip" id="locationStrip">
            <div class="strip-inner">
                <span class="strip-dot"></span>
                <span class="strip-text">Chureito Pagoda, Yamanashi, Japan</span>
                <a class="strip-link" href="https://www.google.com/maps/search/Chureito+Pagoda+Yamanashi+Japan" target="_blank" rel="noopener noreferrer">Open in Maps ↗</a>
            </div>
        </div>
    </section>

    <main>
        <div class="content-grid" id="contentGrid">
            <article class="main-column" id="mainCol">

                <div class="quick-facts">
                    <div class="fact-cell">
                        <span class="fact-label">Capital</span>
                        <div class="fact-value">Tokyo</div>
                    </div>
                    <div class="fact-cell">
                        <span class="fact-label">Time Zone</span>
                        <div class="fact-value">JST <span>(UTC +9)</span></div>
                    </div>
                    <div class="fact-cell">
                        <span class="fact-label">Local Time</span>
                        <div class="fact-value" id="current-jst-time">—</div>
                    </div>
                    <div class="fact-cell">
                        <span class="fact-label">Currency</span>
                        <div class="fact-value">¥ JPY <span id="live-fx-rate"></span></div>
                    </div>
                </div>

                <div class="description-block" id="dynamic-text-block">
                    Discover essential travel information about Japan.
                </div>

                <div class="weather-accordion">
                    <div class="accordion-header" id="weatherHeader" onclick="toggleWeather()">
                        <h2 class="section-title">Climate & Weather</h2>
                        <span class="chevron">▼</span>
                    </div>
                    <div class="accordion-content" id="weatherContent">
                        <div class="accordion-inner">
                            <div class="dynamic-iframe-container">
                                <iframe src="/support/html/japan_climate.html" class="dynamic-iframe" id="climateWidget" title="Japan Climate Data" scrolling="no" onload="extractBestTime()"></iframe>
                            </div>
                        </div>
                    </div>
                </div>

                <h2 class="section-title">National Holidays</h2>
                <div class="dynamic-iframe-container">
                    <iframe src="/support/html/japan_holidays.html" class="dynamic-iframe" title="Japan Holidays" scrolling="no"></iframe>
                </div>

            </article>

            <aside class="support-column" id="supportCol">
                <iframe src="/support/html/japan_map.html" class="support-iframe" title="Japan Map" scrolling="no"></iframe>

                <div class="travel-tips-container">
                    <h3 class="support-title">Travel Tips</h3>
                    <div class="travel-tips-content" id="travel-tips-content">Loading...</div>
                </div>
            </aside>
        </div>
    </main>

    <div id="site-footer"></div>

    <script src="/components.js"></script>
    <script src="/destinations/japan/japan-components.js"></script>

    <script>
        /* ===== HERO IMAGE HANDLER ===== */
        const heroImg = document.getElementById('mainHeroImage');
        const fullUrl = "https://storage.googleapis.com/blog_asset_storage_prod/japan_assets/Japan_Fuji_Hero.JPG";
        function revealFull() {
            heroImg.src = fullUrl;
            setTimeout(() => {
                heroImg.classList.remove('img-low-res');
                heroImg.classList.add('img-loaded');
            }, 50);
        }
        const fullLoader = new Image();
        fullLoader.src = fullUrl;
        fullLoader.onload = revealFull;

        /* ===== JST CLOCK ===== */
        function updateJSTTime() {
            const el = document.getElementById('current-jst-time');
            if (el) el.textContent = new Date().toLocaleTimeString('en-US', {
                timeZone: 'Asia/Tokyo', hour: 'numeric', minute: '2-digit', hour12: true
            });
        }
        updateJSTTime();
        setInterval(updateJSTTime, 30000);

        /* ===== LAYOUT & SCROLL HANDLERS ===== */
        function toggleWeather() {
            document.getElementById('weatherContent').classList.toggle('expanded');
        }

        // Logic for parallax or proportional scrolling could go here if needed
    </script>
</body>
</html>
